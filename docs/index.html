<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カーセンサー 統合検索ビューア</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    /* ===== CSS変数（ライト/ダーク共通） ===== */
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f5f8ff;
      --border: #e0e0e0;
      --text: #333333;
      --text2: #666666;
      --text3: #999999;
      --header-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      --header-text: #ffffff;
      --header-meta: #a0b4cc;
      --primary: #0f3460;
      --primary-light: #e8edf5;
      --price-color: #c0392b;
      --tab-active-border: #0f3460;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.1);
      --card-hover-shadow: 0 6px 16px rgba(0,0,0,0.15);
      --controls-shadow: 0 2px 4px rgba(0,0,0,0.08);
      --badge-bg: rgba(15,52,96,0.85);
      --modal-overlay: rgba(0,0,0,0.45);
      --edit-bar-bg: #fff8e1;
      --edit-bar-border: #ffe082;
      --edit-bar-text: #795548;
      --night-btn-bg: #e0e0e0;
      --night-btn-text: #333;
    }
    body.dark {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2333;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #6e7681;
      --header-bg: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2333 100%);
      --header-text: #e6edf3;
      --header-meta: #8b949e;
      --primary: #58a6ff;
      --primary-light: #1c2333;
      --price-color: #ff7b72;
      --tab-active-border: #58a6ff;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.4);
      --card-hover-shadow: 0 6px 16px rgba(0,0,0,0.6);
      --controls-shadow: 0 2px 4px rgba(0,0,0,0.3);
      --badge-bg: rgba(88,166,255,0.85);
      --modal-overlay: rgba(0,0,0,0.7);
      --edit-bar-bg: #1c2333;
      --edit-bar-border: #30363d;
      --edit-bar-text: #8b949e;
      --night-btn-bg: #30363d;
      --night-btn-text: #e6edf3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.3s, color 0.3s;
    }
    header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
    .header-meta { font-size: 0.78rem; color: var(--header-meta); }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }

    /* ナイトモードトグルボタン */
    .night-toggle {
      background: var(--night-btn-bg);
      color: var(--night-btn-text);
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .night-toggle:hover { opacity: 0.85; }

    .controls {
      background: var(--surface);
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--controls-shadow);
      transition: background 0.3s, border-color 0.3s;
    }
    .controls input, .controls select {
      padding: 7px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
      outline: none;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s, background 0.3s, color 0.3s;
    }
    .controls input:focus, .controls select:focus { border-color: var(--primary); }
    .controls input[type="text"] { width: 200px; }
    .controls input[type="number"] { width: 110px; }
    .controls label { font-size: 0.82rem; color: var(--text2); white-space: nowrap; }
    .count-badge {
      background: var(--primary);
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-left: auto;
    }
    .tabs {
      background: var(--surface);
      padding: 0 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      border-bottom: 2px solid var(--border);
      overflow-x: auto;
      transition: background 0.3s, border-color 0.3s;
    }
    .tab-btn {
      padding: 10px 14px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.82rem;
      color: var(--text2);
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      white-space: nowrap;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex-wrap: nowrap;
    }
    .tab-btn:hover { color: var(--primary); background: var(--surface2); }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--tab-active-border); font-weight: 700; }
    .tab-btn .tab-count {
      background: var(--primary-light);
      color: var(--primary);
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      line-height: 1.4;
    }
    .tab-btn.active .tab-count { background: var(--primary); color: white; }

    /* ラベル編集ボタン（編集モード時は常に表示） */
    .tab-edit-btn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--primary);
      font-size: 0.75rem;
      line-height: 1.4;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      user-select: none;
    }
    .tab-edit-btn:hover { background: var(--primary); color: white; }
    /* 編集モード中は常に表示 */
    body.edit-mode .tab-edit-btn { display: inline-flex; align-items: center; }

    /* 編集モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--modal-overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--surface);
      border-radius: 12px;
      padding: 28px 32px;
      width: 90%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      border: 1px solid var(--border);
    }
    .modal-box h3 { font-size: 1rem; margin-bottom: 16px; color: var(--text); }
    .modal-box input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 18px;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.2s;
    }
    .modal-box input[type="text"]:focus { border-color: var(--primary); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn { padding: 8px 20px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.88rem; font-weight: 600; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-secondary { background: var(--primary-light); color: var(--text2); }
    .btn-danger { background: #c0392b; color: white; }

    /* 編集モードバナー */
    .edit-mode-bar {
      display: none;
      background: var(--edit-bar-bg);
      border-bottom: 1px solid var(--edit-bar-border);
      padding: 8px 16px;
      font-size: 0.82rem;
      color: var(--edit-bar-text);
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .edit-mode-bar.show { display: flex; }

    .main-content {
      padding: 16px;
      max-width: 1600px;
      margin: 0 auto;
    }
    .car-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .car-card {
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
    }
    .car-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--card-hover-shadow);
    }
    .car-img-wrap {
      position: relative;
      width: 100%;
      padding-top: 66%;
      background: var(--surface2);
      overflow: hidden;
    }
    .car-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .car-img-wrap .no-img {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--text3);
      font-size: 0.8rem;
    }
    .label-badge {
      position: absolute;
      top: 8px; left: 8px;
      background: var(--badge-bg);
      color: white;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      backdrop-filter: blur(2px);
    }
    .car-body {
      padding: 10px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .car-title {
      font-size: 0.9rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }
    .price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .total-price {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--price-color);
    }
    .base-price {
      font-size: 0.78rem;
      color: var(--text3);
    }
    .specs-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px 8px;
      font-size: 0.75rem;
    }
    .spec-item { display: flex; gap: 4px; }
    .spec-key { color: var(--text3); white-space: nowrap; }
    .spec-val { color: var(--text2); font-weight: 500; }
    .shop-row {
      font-size: 0.75rem;
      color: var(--text2);
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: auto;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
      font-size: 1rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg {
      text-align: center;
      padding: 40px;
      color: var(--price-color);
      background: var(--surface2);
      border-radius: 8px;
      margin: 20px;
    }
    .no-result {
      text-align: center;
      padding: 40px;
      color: var(--text3);
      grid-column: 1/-1;
    }
    .updated-at {
      font-size: 0.75rem;
      color: var(--text3);
      text-align: right;
      padding: 8px 16px 4px;
    }
    @media (max-width: 600px) {
      .controls input[type="text"] { width: 140px; }
      .car-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>カーセンサー 統合検索ビューア</h1>
    <div class="header-meta">11件の検索条件を1ページで確認</div>
  </div>
  <div class="header-right">
    <button class="night-toggle" onclick="toggleNight()" id="night-btn">🌙 ナイトモード</button>
    <div class="header-meta" id="updated-info">読み込み中...</div>
  </div>
</header>

<!-- 編集モードバナー -->
<div class="edit-mode-bar" id="edit-mode-bar">
  ✏️ <strong>ラベル編集モード：</strong>各タブの「✎」ボタンをクリックして名前を変更できます。
  <button class="btn btn-secondary" style="margin-left:auto;padding:4px 12px;font-size:0.78rem" onclick="toggleEditMode()">編集モードを終了</button>
  <button class="btn btn-danger" style="padding:4px 12px;font-size:0.78rem" onclick="resetAllLabels()">全てリセット</button>
</div>

<div class="controls">
  <label>キーワード:
    <input type="text" id="keyword-input" placeholder="車名・店舗名で絞り込み">
  </label>
  <label>価格上限:
    <input type="number" id="price-max" placeholder="例: 500" min="0" step="10">
    <span style="font-size:0.82rem;color:var(--text2)">万円以下</span>
  </label>
  <label>並び替え:
    <select id="sort-select">
      <option value="default">デフォルト</option>
      <option value="price_asc">価格が安い順</option>
      <option value="price_desc">価格が高い順</option>
      <option value="year_desc">年式が新しい順</option>
      <option value="year_asc">年式が古い順</option>
      <option value="mileage_asc">走行距離が少ない順</option>
    </select>
  </label>
  <button class="btn btn-secondary" style="padding:6px 14px;font-size:0.8rem" onclick="toggleEditMode()" title="タブのラベルを編集する">✏️ ラベル編集</button>
  <span class="count-badge" id="count-badge">0台</span>
</div>

<div class="tabs" id="tabs-container"></div>
<div class="updated-at" id="updated-at-row"></div>

<div class="main-content">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    データを読み込んでいます...
  </div>
  <div id="error-container" style="display:none"></div>
  <div class="car-grid" id="car-grid" style="display:none"></div>
</div>

<!-- ラベル編集モーダル -->
<div class="modal-overlay" id="label-modal">
  <div class="modal-box">
    <h3>✏️ タブ名を編集</h3>
    <input type="text" id="label-input" placeholder="新しいタブ名を入力">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveLabel()">保存</button>
    </div>
  </div>
</div>

<script>
  let allData = [];
  let currentTab = 'all';
  let editMode = false;
  let editingOriginalLabel = null;

  // ===== ナイトモード =====
  function initNightMode() {
    const saved = localStorage.getItem('carsensor_night');
    if (saved === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('night-btn').textContent = '☀️ ライトモード';
    }
  }

  function toggleNight() {
    const isDark = document.body.classList.toggle('dark');
    const btn = document.getElementById('night-btn');
    if (isDark) {
      btn.textContent = '☀️ ライトモード';
      localStorage.setItem('carsensor_night', 'dark');
    } else {
      btn.textContent = '🌙 ナイトモード';
      localStorage.setItem('carsensor_night', 'light');
    }
  }

  // ===== ラベル管理 =====
  function getCustomLabels() {
    try { return JSON.parse(localStorage.getItem('carsensor_labels') || '{}'); }
    catch(e) { return {}; }
  }

  function saveCustomLabels(labels) {
    localStorage.setItem('carsensor_labels', JSON.stringify(labels));
  }

  function getDisplayLabel(originalLabel) {
    const customs = getCustomLabels();
    return customs[originalLabel] || originalLabel;
  }

  // ===== 編集モード =====
  function toggleEditMode() {
    editMode = !editMode;
    document.body.classList.toggle('edit-mode', editMode);
    document.getElementById('edit-mode-bar').classList.toggle('show', editMode);
    initTabs();
  }

  function resetAllLabels() {
    if (confirm('全てのタブ名をデフォルトに戻しますか？')) {
      localStorage.removeItem('carsensor_labels');
      initTabs();
      renderCards();
    }
  }

  function openEditModal(originalLabel, event) {
    event.stopPropagation();
    event.preventDefault();
    editingOriginalLabel = originalLabel;
    document.getElementById('label-input').value = getDisplayLabel(originalLabel);
    document.getElementById('label-modal').classList.add('show');
    setTimeout(() => document.getElementById('label-input').focus(), 50);
  }

  function closeModal() {
    document.getElementById('label-modal').classList.remove('show');
    editingOriginalLabel = null;
  }

  function saveLabel() {
    const newLabel = document.getElementById('label-input').value.trim();
    if (!newLabel) { alert('ラベル名を入力してください'); return; }
    if (!editingOriginalLabel) return;
    const customs = getCustomLabels();
    customs[editingOriginalLabel] = newLabel;
    saveCustomLabels(customs);
    closeModal();
    initTabs();
    renderCards();
  }

  // キーボードショートカット
  document.addEventListener('keydown', (e) => {
    if (document.getElementById('label-modal').classList.contains('show')) {
      if (e.key === 'Enter') saveLabel();
      if (e.key === 'Escape') closeModal();
    }
  });
  document.getElementById('label-modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('label-modal')) closeModal();
  });

  // ===== データ読み込み =====
  async function loadData() {
    try {
      const resp = await fetch('data.json?t=' + Date.now());
      if (!resp.ok) throw new Error('データの取得に失敗しました (HTTP ' + resp.status + ')');
      allData = await resp.json();
      initTabs();
      renderCards();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('car-grid').style.display = 'grid';

      const times = allData.filter(d => d.scraped_at).map(d => d.scraped_at);
      if (times.length > 0) {
        const latest = new Date(Math.max(...times.map(t => new Date(t))));
        const fmt = latest.toLocaleString('ja-JP', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
        document.getElementById('updated-info').textContent = '最終更新: ' + fmt;
        document.getElementById('updated-at-row').textContent = 'データ最終更新: ' + fmt + '（GitHub Actionsにより1日4回自動更新）';
      }
    } catch (e) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-container').style.display = 'block';
      document.getElementById('error-container').innerHTML =
        '<div class="error-msg"><strong>データの読み込みに失敗しました</strong><br>' + e.message + '<br><br>しばらく待ってからページを再読み込みしてください。</div>';
    }
  }

  function initTabs() {
    const container = document.getElementById('tabs-container');
    const allCars = allData.flatMap(d => d.cars);

    // 「すべて」タブ（編集ボタンなし）
    let html = `<button class="tab-btn ${currentTab === 'all' ? 'active' : ''}" onclick="switchTab('all', this)">すべて<span class="tab-count">${allCars.length}</span></button>`;

    allData.forEach(d => {
      const origLabel = d.label;
      const dispLabel = getDisplayLabel(origLabel);
      const isActive = currentTab === origLabel;
      // 編集ボタンはCSSで制御（edit-modeクラスで表示/非表示）
      html += `<button class="tab-btn ${isActive ? 'active' : ''}" onclick="switchTab('${escHtml(origLabel)}', this)">
        <span class="tab-label-text">${escHtml(dispLabel)}</span>
        <span class="tab-edit-btn" onclick="openEditModal('${escHtml(origLabel)}', event)" title="ラベルを編集">✎</span>
        <span class="tab-count">${d.cars.length}</span>
      </button>`;
    });
    container.innerHTML = html;
  }

  function switchTab(label, btn) {
    // 編集ボタンのクリックはタブ切り替えしない
    if (btn && btn.classList.contains('tab-edit-btn')) return;
    currentTab = label;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    // 親のtab-btnを探してactiveにする
    let target = btn;
    while (target && !target.classList.contains('tab-btn')) target = target.parentElement;
    if (target) target.classList.add('active');
    renderCards();
  }

  function getFilteredCars() {
    let cars = currentTab === 'all'
      ? allData.flatMap(d => d.cars)
      : (allData.find(d => d.label === currentTab) || {cars: []}).cars;

    const kw = document.getElementById('keyword-input').value.trim().toLowerCase();
    const priceMax = parseFloat(document.getElementById('price-max').value);
    const sort = document.getElementById('sort-select').value;

    if (kw) {
      cars = cars.filter(c =>
        (c.title || '').toLowerCase().includes(kw) ||
        (c.shop_name || '').toLowerCase().includes(kw) ||
        (c.area || '').toLowerCase().includes(kw)
      );
    }

    if (!isNaN(priceMax) && priceMax > 0) {
      cars = cars.filter(c => {
        const p = parsePrice(c.total_price);
        return p !== null && p <= priceMax;
      });
    }

    if (sort === 'price_asc') cars.sort((a, b) => (parsePrice(a.total_price) ?? 99999) - (parsePrice(b.total_price) ?? 99999));
    else if (sort === 'price_desc') cars.sort((a, b) => (parsePrice(b.total_price) ?? 0) - (parsePrice(a.total_price) ?? 0));
    else if (sort === 'year_desc') cars.sort((a, b) => parseYear(b.year) - parseYear(a.year));
    else if (sort === 'year_asc') cars.sort((a, b) => parseYear(a.year) - parseYear(b.year));
    else if (sort === 'mileage_asc') cars.sort((a, b) => parseMileage(a.mileage) - parseMileage(b.mileage));

    return cars;
  }

  function parsePrice(s) {
    if (!s || s === '---') return null;
    const m = s.replace(/,/g, '').match(/[\d.]+/);
    return m ? parseFloat(m[0]) : null;
  }

  function parseYear(s) {
    if (!s || s === '---') return 0;
    const m = s.match(/(\d{4})/);
    return m ? parseInt(m[1]) : 0;
  }

  function parseMileage(s) {
    if (!s || s === '---') return 999999;
    const m = s.replace(/,/g, '').match(/[\d.]+/);
    if (!m) return 999999;
    const v = parseFloat(m[0]);
    return s.includes('万') ? v * 10000 : v;
  }

  function escHtml(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function renderCards() {
    const cars = getFilteredCars();
    const grid = document.getElementById('car-grid');
    document.getElementById('count-badge').textContent = cars.length + '台';

    if (cars.length === 0) {
      grid.innerHTML = '<div class="no-result">条件に一致する車両が見つかりませんでした</div>';
      return;
    }

    grid.innerHTML = cars.map(c => {
      const dispLabel = getDisplayLabel(c.search_label);
      const imgHtml = c.image_url
        ? `<img src="${escHtml(c.image_url)}" alt="${escHtml(c.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">`
        : '';
      const noImgHtml = `<div class="no-img" style="${c.image_url ? 'display:none' : ''}">画像なし</div>`;

      return `<a class="car-card" href="${escHtml(c.detail_url)}" target="_blank" rel="noopener">
        <div class="car-img-wrap">
          ${imgHtml}${noImgHtml}
          <span class="label-badge">${escHtml(dispLabel)}</span>
        </div>
        <div class="car-body">
          <div class="car-title">${escHtml(c.title) || '（車名不明）'}</div>
          <div class="price-row">
            <span class="total-price">${escHtml(c.total_price)}</span>
            ${c.base_price && c.base_price !== '---' ? `<span class="base-price">本体 ${escHtml(c.base_price)}</span>` : ''}
          </div>
          <div class="specs-grid">
            <div class="spec-item"><span class="spec-key">年式:</span><span class="spec-val">${escHtml(c.year)}</span></div>
            <div class="spec-item"><span class="spec-key">走行:</span><span class="spec-val">${escHtml(c.mileage)}</span></div>
            <div class="spec-item"><span class="spec-key">修復歴:</span><span class="spec-val">${escHtml(c.repair_history)}</span></div>
            <div class="spec-item"><span class="spec-key">車検:</span><span class="spec-val">${escHtml(c.inspection)}</span></div>
          </div>
          <div class="shop-row">${escHtml(c.shop_name)}${c.area && c.area !== '---' ? ' ／ ' + escHtml(c.area) : ''}</div>
        </div>
      </a>`;
    }).join('');
  }

  document.getElementById('keyword-input').addEventListener('input', renderCards);
  document.getElementById('price-max').addEventListener('input', renderCards);
  document.getElementById('sort-select').addEventListener('change', renderCards);

  // 初期化
  initNightMode();
  loadData();
</script>
</body>
</html>
